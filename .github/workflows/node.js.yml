name: Semiotic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run dist

      - name: Build MCP server
        run: npm run build:mcp

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Run type check
        run: npm run typescript

      - name: Check schema freshness
        run: npm run check:schema

      - name: Build production bundles
        run: npm run dist:prod

      - name: Verify TypeScript declarations
        run: |
          for f in dist/semiotic.d.ts dist/semiotic-xy.d.ts dist/semiotic-ordinal.d.ts dist/semiotic-network.d.ts dist/semiotic-geo.d.ts dist/semiotic-realtime.d.ts dist/semiotic-ai.d.ts dist/semiotic-data.d.ts dist/semiotic-server.d.ts dist/semiotic-themes.d.ts; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All declaration files present"

      - name: Check bundle sizes
        run: npx size-limit

      - name: Run benchmarks
        run: npx vitest bench --reporter=verbose

  e2e:
    runs-on: ubuntu-latest
    needs: testing

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build library
        run: npm run dist

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload snapshot baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots
          path: integration-tests/*.spec.ts-snapshots/
          retention-days: 30

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: integration-tests/test-results/
          retention-days: 7
