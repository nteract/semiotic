name: Semiotic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run dist

      - name: Build MCP server
        run: npm run build:mcp

      - name: Run tests
        run: npm test

      - name: Run type check
        run: npm run typescript

      - name: Check schema freshness
        run: npm run check:schema

  e2e:
    runs-on: ubuntu-latest
    needs: testing

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build library
        run: npm run dist

      - name: Run E2E tests
        run: npm run test:dist

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            integration-tests/test-results/
            integration-tests/*.spec.ts-snapshots/
          retention-days: 7
