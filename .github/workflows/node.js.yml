name: Semiotic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          # The PR-vs-main bench gate worktrees `origin/main` to capture a
          # CI-native baseline in the same job. Default checkout is shallow
          # to the triggering ref only; the gate's `git fetch origin main`
          # works on a shallow clone but worktree-add wants the ref locally.
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run dist

      - name: Build MCP server
        run: npm run build:mcp

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Run type check
        run: npm run typescript

      - name: Run MCP type check
        run: npm run typescript:mcp

      - name: Check schema freshness
        run: npm run check:schema

      - name: Check AI/MCP surface parity
        run: npm run check:surface

      - name: Check SSR alignment
        run: npm run check:ssr

      - name: Check public API surface (no breaking changes)
        run: npm run check:api-surface

      - name: Build production bundles
        run: npm run dist:prod

      - name: Pack smoke test (verify all entry points resolve)
        run: npm run check:pack

      - name: Verify TypeScript declarations
        run: |
          for f in dist/semiotic.d.ts dist/semiotic-xy.d.ts dist/semiotic-ordinal.d.ts dist/semiotic-network.d.ts dist/semiotic-geo.d.ts dist/semiotic-realtime.d.ts dist/semiotic-ai.d.ts dist/semiotic-data.d.ts dist/semiotic-server.d.ts dist/semiotic-themes.d.ts; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All declaration files present"

      - name: Check bundle sizes
        run: npx size-limit

      - name: Validate canvas stub completeness
        run: |
          # Extract canvas method names used in production renderers
          USED=$(grep -roh 'ctx\.\([a-zA-Z]*\)' src/components/stream/renderers/ | \
            sed 's/ctx\.//' | sort -u | grep -v '^$')
          # Extract stubbed method names from setupTests.ts
          STUBBED=$(grep -oP '"\K[a-zA-Z]+(?=")' src/setupTests.ts | sort -u)
          # Find methods used in renderers but not stubbed
          MISSING=""
          for method in $USED; do
            if ! echo "$STUBBED" | grep -qx "$method"; then
              # Skip property assignments (not methods)
              case "$method" in
                fillStyle|strokeStyle|lineWidth|lineCap|lineJoin|globalAlpha|\
                globalCompositeOperation|font|textAlign|textBaseline|shadowColor|\
                shadowBlur|shadowOffsetX|shadowOffsetY|lineDashOffset|miterLimit|\
                canvas|imageSmoothingEnabled|direction|filter|letterSpacing|\
                fontKerning|fontStretch|fontVariantCaps|textRendering|wordSpacing)
                  ;; # property, not a method — skip
                *)
                  MISSING="$MISSING $method"
                  ;;
              esac
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "Canvas methods used in renderers but not stubbed in setupTests.ts:"
            echo "$MISSING"
            echo ""
            echo "Add these to the canvasMethods array in src/setupTests.ts"
            exit 1
          fi
          echo "All canvas methods are stubbed"

      - name: Bench regression gate (PR vs main, CI-native baseline)
        # PR-only: captures main's bench numbers in the same job on the same
        # hardware, then compares the PR's results against them. Avoids the
        # cross-architecture noise that plagued the committed-baseline
        # approach (M-series Mac local capture vs. x86 Linux CI runner
        # produced uniform 60–90% "slowdowns" across every benchmark).
        # On `push: main` this step is skipped — there's nothing to compare
        # main against, and the committed baseline is informational only.
        if: github.event_name == 'pull_request'
        run: npm run bench:pr-vs-main

  e2e:
    runs-on: ubuntu-latest
    needs: testing

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build library
        run: npm run dist

      - name: Generate missing Linux snapshot baselines (smoke fallback)
        run: |
          # Smoke-test fallback: if no Linux baselines have been committed,
          # generate them so the e2e job doesn't fail with "missing snapshot."
          # IMPORTANT: this also rewrites any committed baselines that
          # differ — meaning once you opt in here, you lose the regression
          # gate for the run. Use this only to bootstrap baselines for
          # newly-added specs, then:
          #   1. Download the `playwright-snapshots` artifact from this run
          #      (uploaded below regardless of pass/fail).
          #   2. Copy the new *-chromium-linux.png (and *-webkit-linux.png,
          #      *-firefox-linux.png) files into the matching
          #      integration-tests/<spec>.spec.ts-snapshots/ directory.
          #   3. Commit and push. The next CI run uses them as the
          #      regression gate.
          HAVE_LINUX=$(find integration-tests -name "*-chromium-linux.png" -print -quit)
          if [ -z "$HAVE_LINUX" ]; then
            echo "::warning::No Linux baselines committed — generating on the fly. Visual regression is non-binding until baselines are committed."
            npx playwright test --update-snapshots || true
          else
            echo "Linux baselines present — running tests as a regression gate"
          fi

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload snapshot baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots
          path: integration-tests/*.spec.ts-snapshots/
          retention-days: 30

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: integration-tests/test-results/
          retention-days: 7
