<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semiotic mobile visualization harness</title>
  <style>
    html {
      box-sizing: border-box;
      background: #f4efe5;
      color: #17211b;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      padding: 12px;
    }

    .mobile-harness {
      display: grid;
      gap: 14px;
      margin: 0 auto;
      max-width: 760px;
      width: 100%;
    }

    .mobile-harness__intro,
    .test-case {
      background: #fffdf8;
      border: 1px solid #dacfb9;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(51, 39, 20, 0.08);
      padding: 12px;
      width: 100%;
    }

    .mobile-harness__intro h1,
    .test-case h2 {
      color: #243026;
      font-size: 15px;
      line-height: 1.2;
      margin: 0 0 8px;
    }

    .mobile-harness__intro p,
    .test-case p {
      color: #5c5142;
      font-size: 13px;
      line-height: 1.45;
      margin: 0;
    }

    .touch-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 0;
    }

    .touch-strip button {
      align-items: center;
      background: #20382d;
      border: 0;
      border-radius: 999px;
      color: #fffdf8;
      display: inline-flex;
      font: inherit;
      font-size: 13px;
      min-height: 44px;
      min-width: 44px;
      padding: 0 14px;
    }

    .callout-fixture {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
