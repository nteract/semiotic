<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semiotic physics charts - settled visual baselines</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1f2937;
    }
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 16px;
      align-items: start;
    }
    .test-case {
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
    }
    .test-case h2 {
      margin: 0 0 8px;
      color: #475569;
      font-size: 14px;
      font-weight: 600;
    }
    .stream-physics-frame canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
